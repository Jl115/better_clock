name: better_clock
description: "A modern, highly customizable clock app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0

  # Dependency Injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^15.1.2

  # Database / ORM
  floor: ^1.5.0
  sqflite: ^2.3.0

  # Audio
  audioplayers: ^6.4.0

  # File System
  file_picker: ^10.1.7
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^19.2.0

  # Permissions
  permission_handler: ^12.0.0

  # Utils
  equatable: ^2.0.7
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  floor_generator: ^1.5.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
